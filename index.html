<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="CINÉMA JUN - Track, rate, and remember every film and anime you've watched.">
<meta name="theme-color" content="#8B5CF6">
<title>CINÉMA JUN — Film & Anime Diary</title>
<link rel="icon" type="image/jpeg" href="https://i.ibb.co/RGhFkVQ7/22.jpg">
<link rel="apple-touch-icon" href="https://i.ibb.co/RGhFkVQ7/22.jpg">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* Custom Styles */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0A0A0F 0%, #0F0F1A 100%);
    color: #F5F3F0;
  }
  
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: #1A1A2E; }
  ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #8B5CF6, #A855F7); border-radius: 10px; }
  
  .glass-card {
    background: rgba(20, 20, 35, 0.5);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  }
  .glass-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 25px -12px rgba(139, 92, 246, 0.3);
    border-color: rgba(139, 92, 246, 0.3);
  }
  
  .gradient-text {
    background: linear-gradient(135deg, #8B5CF6 0%, #A855F7 50%, #C084FC 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  
  .movie-card {
    background: #111117;
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    cursor: pointer;
    border: 1px solid rgba(139, 92, 246, 0.2);
  }
  .movie-card:hover {
    transform: translateY(-5px);
    border-color: rgba(139, 92, 246, 0.5);
    box-shadow: 0 20px 30px -15px rgba(139, 92, 246, 0.4);
  }
  
  .poster-container {
    position: relative;
    overflow: hidden;
    aspect-ratio: 2/3;
  }
  .poster-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
  }
  .movie-card:hover .poster-container img {
    transform: scale(1.05);
  }
  
  .rating-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: linear-gradient(135deg, #8B5CF6, #A855F7);
    border-radius: 30px;
    padding: 4px 10px;
    font-size: 0.7rem;
    font-weight: 700;
    color: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    z-index: 10;
  }
  
  .status-badge {
    position: absolute;
    bottom: 10px;
    left: 10px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  .status-watching { background: linear-gradient(135deg, #3B82F6, #2563EB); color: white; }
  .status-completed { background: linear-gradient(135deg, #10B981, #059669); color: white; }
  .status-plan { background: linear-gradient(135deg, #8B5CF6, #6D28D9); color: white; }
  .status-dropped { background: linear-gradient(135deg, #EF4444, #DC2626); color: white; }
  
  .card-info { padding: 12px; }
  .card-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { font-size: 0.7rem; color: #6B697A; }
  .info-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 0.65rem; color: #6B697A; }
  .progress-bar { margin-top: 8px; height: 3px; background: #2A2A35; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #8B5CF6, #A855F7); border-radius: 3px; }
  
  .filter-chip {
    padding: 0.5rem 1rem;
    border-radius: 40px;
    font-size: 0.75rem;
    font-weight: 500;
    transition: all 0.2s ease;
    cursor: pointer;
    border: 1px solid rgba(139, 92, 246, 0.3);
    background: rgba(15, 15, 26, 0.6);
    color: #A5A3B0;
  }
  .filter-chip:hover {
    border-color: #8B5CF6;
    background: rgba(139, 92, 246, 0.15);
    color: #C084FC;
  }
  .filter-chip.active {
    background: linear-gradient(135deg, #8B5CF6, #A855F7);
    border-color: transparent;
    color: white;
    box-shadow: 0 2px 8px rgba(139, 92, 246, 0.4);
  }
  
  .input-modern {
    background: rgba(10, 10, 15, 0.8);
    border: 1px solid rgba(139, 92, 246, 0.2);
    border-radius: 12px;
    padding: 0.75rem 1rem;
    color: white;
    font-size: 0.875rem;
    transition: all 0.2s ease;
    width: 100%;
  }
  .input-modern:focus {
    border-color: #8B5CF6;
    box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    outline: none;
  }
  
  .star-btn {
    transition: all 0.1s ease;
    background: none;
    border: none;
    cursor: pointer;
  }
  .star-btn:hover {
    transform: scale(1.1);
  }
  
  .modal-glass {
    background: linear-gradient(135deg, #0F0F1A, #0A0A0F);
    border: 1px solid rgba(139, 92, 246, 0.3);
    border-radius: 28px;
  }
  
  .skeleton {
    background: linear-gradient(90deg, #1A1A2E 25%, #2A2A3E 50%, #1A1A2E 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .skeleton-poster {
    aspect-ratio: 2/3;
    border-radius: 12px;
  }
  
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #0F0F1A;
    border: 1px solid #8B5CF6;
    border-radius: 40px;
    padding: 10px 20px;
    color: #C084FC;
    font-size: 0.875rem;
    z-index: 100;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s ease;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }
  
  .movies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }
  
  @media (min-width: 768px) {
    .movies-grid {
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 24px;
    }
  }
  
  @media (max-width: 767px) {
    .sidebar-desktop { display: none; }
    .mobile-fab { display: flex; }
  }
  @media (min-width: 768px) {
    .mobile-fab { display: none; }
    .mobile-drawer { display: none; }
  }
  
  .sidebar-desktop {
    background: rgba(15, 15, 26, 0.5);
    border-radius: 24px;
    border: 1px solid rgba(139, 92, 246, 0.2);
    backdrop-filter: blur(8px);
  }
  
  .filter-drawer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(135deg, #0F0F1A, #0A0A0F);
    border-radius: 28px 28px 0 0;
    border-top: 1px solid rgba(139, 92, 246, 0.3);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    z-index: 60;
    max-height: 85vh;
    overflow-y: auto;
  }
  .filter-drawer.open { transform: translateY(0); }
  
  .fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 28px;
    background: linear-gradient(135deg, #8B5CF6, #A855F7);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 50;
  }
  .fab:hover { transform: scale(1.05); }
  
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    background: rgba(15, 15, 26, 0.5);
    border-radius: 32px;
    border: 1px dashed rgba(139, 92, 246, 0.3);
  }
</style>
</head>
<body>

<!-- Header -->
<header class="sticky top-0 z-50 bg-[#0A0A0F]/90 backdrop-blur-xl border-b border-purple-500/20 px-4 sm:px-6 md:px-10 py-3 md:py-4 flex items-center justify-between">
  <div class="logo font-['Playfair_Display'] text-xl md:text-2xl font-semibold bg-gradient-to-r from-purple-400 to-purple-600 bg-clip-text text-transparent cursor-pointer" onclick="resetToHome()">
    CINÉMA JUN
  </div>
  <div class="hidden md:flex gap-3">
    <button class="bg-white/5 border border-purple-500/30 rounded-full px-4 py-2 text-sm text-purple-300 hover:bg-purple-500/20 transition-all" onclick="loadFromSheets()">
      <i class="fas fa-sync-alt mr-1"></i> Sync
    </button>
    <button class="bg-gradient-to-r from-purple-500 to-purple-600 rounded-full px-5 py-2 text-sm text-white font-semibold hover:shadow-lg transition-all" onclick="openModal()">
      <i class="fas fa-plus mr-1"></i> Add Title
    </button>
  </div>
</header>

<!-- Stats Cards -->
<div class="px-4 sm:px-6 md:px-10 mt-6">
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
    <div class="glass-card rounded-2xl p-4 text-center cursor-pointer" onclick="applyStatusFilter('all')">
      <i class="fas fa-film text-2xl text-purple-400 mb-2 block"></i>
      <div class="text-2xl md:text-3xl font-bold gradient-text" id="stat-total">—</div>
      <div class="text-xs text-purple-300/60 mt-1">Total Films</div>
    </div>
    <div class="glass-card rounded-2xl p-4 text-center cursor-pointer" onclick="applyStatusFilter('watching')">
      <i class="fas fa-eye text-2xl text-blue-400 mb-2 block"></i>
      <div class="text-2xl md:text-3xl font-bold gradient-text" id="stat-watching">—</div>
      <div class="text-xs text-purple-300/60 mt-1">Watching</div>
    </div>
    <div class="glass-card rounded-2xl p-4 text-center cursor-pointer" onclick="applyStatusFilter('completed')">
      <i class="fas fa-check-circle text-2xl text-green-400 mb-2 block"></i>
      <div class="text-2xl md:text-3xl font-bold gradient-text" id="stat-completed">—</div>
      <div class="text-xs text-purple-300/60 mt-1">Completed</div>
    </div>
    <div class="glass-card rounded-2xl p-4 text-center cursor-pointer" onclick="applyStatusFilter('plan')">
      <i class="fas fa-clock text-2xl text-purple-300 mb-2 block"></i>
      <div class="text-2xl md:text-3xl font-bold gradient-text" id="stat-plan">—</div>
      <div class="text-xs text-purple-300/60 mt-1">Watchlist</div>
    </div>
  </div>
</div>

<!-- Main Layout -->
<main class="px-4 sm:px-6 md:px-10 py-6">
  <div class="flex flex-col md:flex-row gap-6">
    <!-- Sidebar - Desktop -->
    <aside class="sidebar-desktop md:w-80 p-5 h-fit md:sticky md:top-24">
      <div class="mb-6">
        <div class="text-purple-400 text-xs font-semibold uppercase mb-3">Status</div>
        <div class="space-y-1">
          <div class="flex justify-between p-2 rounded-xl cursor-pointer hover:bg-purple-500/10" id="nav-all" onclick="setStatusFilter('all',this)">
            <span><i class="fas fa-list-ul mr-2 text-purple-400"></i>All</span>
            <span class="text-xs bg-purple-500/20 px-2 py-0.5 rounded-full" id="cnt-all">0</span>
          </div>
          <div class="flex justify-between p-2 rounded-xl cursor-pointer hover:bg-purple-500/10" id="nav-watching" onclick="setStatusFilter('watching',this)">
            <span><i class="fas fa-eye mr-2 text-blue-400"></i>Watching</span>
            <span class="text-xs bg-purple-500/20 px-2 py-0.5 rounded-full" id="cnt-watching-nav">0</span>
          </div>
          <div class="flex justify-between p-2 rounded-xl cursor-pointer hover:bg-purple-500/10" id="nav-completed" onclick="setStatusFilter('completed',this)">
            <span><i class="fas fa-check-circle mr-2 text-green-400"></i>Completed</span>
            <span class="text-xs bg-purple-500/20 px-2 py-0.5 rounded-full" id="cnt-completed-nav">0</span>
          </div>
          <div class="flex justify-between p-2 rounded-xl cursor-pointer hover:bg-purple-500/10" id="nav-plan" onclick="setStatusFilter('plan',this)">
            <span><i class="fas fa-clock mr-2 text-purple-300"></i>Plan to Watch</span>
            <span class="text-xs bg-purple-500/20 px-2 py-0.5 rounded-full" id="cnt-plan-nav">0</span>
          </div>
          <div class="flex justify-between p-2 rounded-xl cursor-pointer hover:bg-purple-500/10" id="nav-dropped" onclick="setStatusFilter('dropped',this)">
            <span><i class="fas fa-times-circle mr-2 text-red-400"></i>Dropped</span>
            <span class="text-xs bg-purple-500/20 px-2 py-0.5 rounded-full" id="cnt-dropped-nav">0</span>
          </div>
        </div>
      </div>
      
      <div class="mb-6">
        <div class="text-purple-400 text-xs font-semibold uppercase mb-3">Type</div>
        <div class="flex flex-wrap gap-2">
          <button class="filter-chip" onclick="setTypeFilter('all',this)">All Types</button>
          <button class="filter-chip" onclick="setTypeFilter('Movie',this)">🎬 Movie</button>
          <button class="filter-chip" onclick="setTypeFilter('Series',this)">📺 Series</button>
          <button class="filter-chip" onclick="setTypeFilter('Anime Movie',this)">🎬 Anime Movie</button>
          <button class="filter-chip" onclick="setTypeFilter('Anime Series',this)">📺 Anime Series</button>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-3 text-xs text-purple-300/50">
          <div><span class="text-purple-400" id="cnt-movie">0</span> Movies</div>
          <div><span class="text-purple-400" id="cnt-series">0</span> Series</div>
          <div><span class="text-purple-400" id="cnt-anime-movie">0</span> Anime Movies</div>
          <div><span class="text-purple-400" id="cnt-anime-series">0</span> Anime Series</div>
        </div>
      </div>
      
      <div>
        <div class="text-purple-400 text-xs font-semibold uppercase mb-3">Genres</div>
        <div class="genre-cloud flex flex-wrap gap-2" id="genre-cloud"></div>
      </div>
    </aside>

    <!-- Content -->
    <div class="flex-1">
      <!-- Search & Sort -->
      <div class="flex flex-col sm:flex-row gap-3 mb-6">
        <div class="flex-1 relative">
          <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-purple-400/50 text-sm"></i>
          <input class="w-full bg-[#0F0F1A] border border-purple-500/20 rounded-xl py-3 pl-10 pr-4 text-sm text-white placeholder:text-purple-300/30 focus:border-purple-500 focus:outline-none" type="text" placeholder="Search by title, genre..." id="search-input" oninput="renderMedia()">
        </div>
        <select class="bg-[#0F0F1A] border border-purple-500/20 rounded-xl py-3 px-4 text-sm text-purple-300" id="sort-select" onchange="renderMedia()">
          <option value="added">Recently Added</option>
          <option value="rating">Highest Rated</option>
          <option value="title">A → Z</option>
          <option value="year">Year</option>
        </select>
      </div>
      
      <div class="flex justify-between items-center mb-4">
        <div class="font-['Playfair_Display'] text-xl md:text-2xl font-semibold" id="section-title">All <span class="text-purple-400">Titles</span></div>
        <div class="flex gap-2">
          <button class="w-9 h-9 rounded-xl border border-purple-500/30 bg-purple-500/20 text-purple-400" id="btn-grid" onclick="setViewMode('grid')"><i class="fas fa-th"></i></button>
          <button class="w-9 h-9 rounded-xl border border-purple-500/30 bg-transparent text-purple-300/60 hover:bg-purple-500/10" id="btn-list" onclick="setViewMode('list')"><i class="fas fa-list"></i></button>
        </div>
      </div>
      
      <div id="media-container"></div>
    </div>
  </div>
</main>

<!-- Mobile FAB -->
<div class="mobile-fab">
  <div class="fab" onclick="openModal()">
    <i class="fas fa-plus"></i>
  </div>
  <button class="fixed bottom-24 right-5 bg-[#0F0F1A] border border-purple-500/30 rounded-full px-4 py-2 text-sm text-purple-300 z-40" onclick="openDrawer()">
    <i class="fas fa-sliders-h mr-1"></i> Filter
  </button>
</div>

<!-- Mobile Filter Drawer -->
<div class="filter-drawer" id="filter-drawer">
  <div class="w-12 h-1 bg-purple-500/50 rounded-full mx-auto mt-3"></div>
  <div class="p-4 border-b border-purple-500/20 flex justify-between">
    <div class="font-['Playfair_Display'] text-xl text-purple-400">Filter & Sort</div>
    <button class="text-purple-400 text-sm" onclick="resetAllFilters()"><i class="fas fa-undo mr-1"></i> Reset</button>
  </div>
  <div class="p-4">
    <div class="text-purple-400 text-xs font-semibold mb-2">Status</div>
    <div id="drawer-status" class="flex flex-wrap gap-2"></div>
  </div>
  <div class="px-4 pb-4">
    <div class="text-purple-400 text-xs font-semibold mb-2">Type</div>
    <div id="drawer-type" class="flex flex-wrap gap-2"></div>
  </div>
  <div class="px-4 pb-4">
    <div class="text-purple-400 text-xs font-semibold mb-2">Genre</div>
    <div id="drawer-genre" class="flex flex-wrap gap-2"></div>
  </div>
  <div class="px-4 pb-4">
    <div class="text-purple-400 text-xs font-semibold mb-2">Sort By</div>
    <div class="flex flex-wrap gap-2">
      <button class="filter-chip" onclick="document.getElementById('sort-select').value='added';renderMedia();closeDrawer()">Recently Added</button>
      <button class="filter-chip" onclick="document.getElementById('sort-select').value='rating';renderMedia();closeDrawer()">Highest Rated</button>
      <button class="filter-chip" onclick="document.getElementById('sort-select').value='title';renderMedia();closeDrawer()">A → Z</button>
      <button class="filter-chip" onclick="document.getElementById('sort-select').value='year';renderMedia();closeDrawer()">Year</button>
    </div>
  </div>
  <button class="w-[calc(100%-2rem)] mx-4 mb-5 py-3 bg-gradient-to-r from-purple-500 to-purple-600 rounded-full text-white font-semibold" onclick="closeDrawer()">Apply Filters</button>
</div>

<!-- Modal Add/Edit -->
<div class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal-glass rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
    <div class="sticky top-0 bg-[#0F0F1A]/95 p-5 border-b border-purple-500/20 flex justify-between">
      <div class="font-['Playfair_Display'] text-xl text-purple-400" id="modal-heading"><i class="fas fa-plus-circle mr-2"></i> Add New Title</div>
      <button class="w-8 h-8 rounded-full bg-purple-500/10 border border-purple-500/30 text-purple-300 hover:border-red-500" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="p-5">
      <!-- TMDB Search -->
      <div class="mb-5">
        <label class="text-purple-400 text-xs uppercase mb-2 block">Search TMDB</label>
        <div class="relative">
          <div class="flex gap-2">
            <input class="flex-1 input-modern" id="tmdb-q" placeholder="Type movie or series title..." oninput="onTmdbType(this.value)">
            <button class="bg-white/5 border border-purple-500/30 rounded-xl px-3 text-purple-300" onclick="clearTmdb()"><i class="fas fa-times"></i></button>
          </div>
          <div class="absolute top-full left-0 right-0 bg-[#0F0F1A] border border-purple-500/30 rounded-xl mt-1 max-h-72 overflow-y-auto z-50 hidden" id="tmdb-dd"></div>
        </div>
      </div>
      
      <!-- Poster & Title -->
      <div class="flex gap-4 mb-4 flex-wrap">
        <div class="w-24 h-36 bg-[#0A0A0F] rounded-xl flex items-center justify-center border border-purple-500/20 overflow-hidden" id="poster-box">
          <i class="fas fa-image text-3xl text-purple-500/30"></i>
        </div>
        <div class="flex-1">
          <div class="mb-3">
            <label class="text-purple-400 text-xs uppercase mb-1 block">Title *</label>
            <input type="text" id="f-title" class="w-full input-modern" placeholder="Enter title...">
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-purple-400 text-xs uppercase mb-1 block">Type</label>
              <select id="f-type" class="w-full input-modern">
                <option value="Movie">🎬 Movie</option>
                <option value="Series">📺 Series</option>
                <option value="Anime Movie">🎬 Anime Movie</option>
                <option value="Anime Series">📺 Anime Series</option>
              </select>
            </div>
            <div>
              <label class="text-purple-400 text-xs uppercase mb-1 block">Year</label>
              <input type="number" id="f-year" class="w-full input-modern" placeholder="2024">
            </div>
          </div>
        </div>
      </div>
      
      <!-- 2 Column Form -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div><label class="text-purple-400 text-xs uppercase mb-1 block">Status</label><select id="f-status" class="w-full input-modern"><option value="plan">📋 Plan to Watch</option><option value="watching">👀 Watching</option><option value="completed">✅ Completed</option><option value="dropped">❌ Dropped</option></select></div>

<script>
// ============ KONFIGURASI ============
const API_SHEETS = 'https://script.google.com/macros/s/AKfycbzh8io9WKVNYNeCzuS-zciBpGMon4Wu_OtdDwZjz9KvQmavgaN_91dT4Uj4obTOU1RqZw/exec';
const TMDB_KEY = 'a2c120d7d3aaaf1321ffe8a9899ef765';
const TMDB_IMG_BASE = 'https://image.tmdb.org/t/p/w342';

let mediaData = [];
let currentRating = 0;
let editingId = null;
let currentStatusFilter = 'all';
let currentTypeFilter = 'all';
let currentGenreFilter = 'all';
let currentViewMode = 'grid';
let isSaving = false;
let tmdbTimer = null;
let isLoading = true;

// ============ UTILITY ==========
function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'} mr-1"></i> ${msg}`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}
function resetToHome() {
    currentStatusFilter = 'all';
    currentTypeFilter = 'all';
    currentGenreFilter = 'all';
    document.getElementById('sort-select').value = 'added';
    document.getElementById('search-input').value = '';
    renderMedia();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
function formatWatchDate(dateValue) {
    if (!dateValue || dateValue === '') return 'Not set';
    try {
        let date = dateValue.includes('T') ? new Date(dateValue) : new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return 'Not set';
        return `${date.getDate()} ${date.toLocaleDateString('id-ID', { month: 'long' })} ${date.getFullYear()}`;
    } catch(e) { return 'Not set'; }
}
function formatRewatch(count) {
    if (!count || count === 0) return '';
    return `${count}x rewatch`;
}
function convertToYYYYMMDD(dateValue) {
    if (!dateValue || dateValue === '') return '';
    try {
        if (dateValue.match(/^\d{4}-\d{2}-\d{2}$/)) return dateValue;
        let date = dateValue.includes('T') ? new Date(dateValue) : new Date(dateValue);
        if (isNaN(date.getTime())) return '';
        return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    } catch(e) { return ''; }
}
function calculateProgress(type, episodesText, currentText) {
    if (!currentText) return 0;
    let current = 0, total = 0;
    if (currentText.includes('/')) {
        let parts = currentText.split('/');
        current = parseFloat(parts[0]) || 0;
        total = parseFloat(parts[1]) || 0;
    } else {
        current = parseFloat(currentText) || 0;
        if (type.includes('Series') && episodesText) {
            let match = episodesText.match(/(\d+)\s*eps?/i);
            if (match) total = parseFloat(match[1]);
        } else if (type.includes('Movie') && episodesText) {
            let match = episodesText.match(/(\d+)\s*min/i);
            if (match) total = parseFloat(match[1]);
        }
    }
    if (total > 0 && current > 0) return Math.min(100, Math.round((current / total) * 100));
    return 0;
}
function updateProgressAutomatically() {
    let type = document.getElementById('f-type').value;
    let episodes = document.getElementById('f-episodes').value;
    let current = document.getElementById('f-current-episode').value;
    let progress = calculateProgress(type, episodes, current);
    if (progress > 0) document.getElementById('f-progress').value = progress;
}

// ============ DATABASE ==========
async function apiSheets(body) {
    let res = await fetch(API_SHEETS, { method: 'POST', body: JSON.stringify(body) });
    return await res.json();
}
async function loadFromSheets() {
    isLoading = true;
    showSkeleton();
    try {
        let res = await fetch(API_SHEETS + '?action=getAll');
        let data = await res.json();
        if (data.error) throw new Error(data.error);
        mediaData = (data.movies || []).map(m => {
            let watchDate = '';
            if (m.watchDate) watchDate = m.watchDate;
            else if (m.watchdate) watchDate = m.watchdate;
            return {
                id: Number(m.id || 0), title: String(m.title || ''), type: String(m.type || 'Movie'),
                year: Number(m.year || 0), status: String(m.status || 'plan'), genre: String(m.genre || ''),
                episodes: String(m.episodes || ''), currentEpisode: String(m.currentEpisode || m.currentepisode || ''),
                progress: Number(m.progress || 0), rating: Number(m.rating || 0), notes: String(m.notes || ''),
                added: Number(m.added || 0), poster: String(m.poster || ''), tmdbId: String(m.tmdbId || m.tmdbid || ''),
                rewatch: Number(m.rewatch || 0), watchDate: convertToYYYYMMDD(watchDate), lastEdit: Number(m.lastEdit || m.lastedit || Date.now())
            };
        });
        isLoading = false;
        renderMedia();
    } catch(err) { 
        showToast(err.message, true);
        isLoading = false;
        renderMedia();
    }
}
function showSkeleton() {
    const container = document.getElementById('media-container');
    if (container && isLoading) {
        container.innerHTML = `<div class="movies-grid">
            ${Array(12).fill().map(() => `
                <div>
                    <div class="skeleton skeleton-poster w-full rounded-xl"></div>
                    <div class="skeleton h-3 w-3/4 rounded mt-2"></div>
                    <div class="skeleton h-2 w-1/2 rounded mt-1"></div>
                </div>
            `).join('')}
        </div>`;
    }
}
async function saveEntry() {
    if (isSaving) return;
    let title = document.getElementById('f-title').value.trim();
    if (!title) { showToast('Please enter a title', true); return; }
    
    let type = document.getElementById('f-type').value;
    let episodes = document.getElementById('f-episodes').value;
    let currentEpisodeValue = document.getElementById('f-current-episode').value;
    let calcProgress = calculateProgress(type, episodes, currentEpisodeValue);
    let finalProgress = calcProgress > 0 ? calcProgress : parseInt(document.getElementById('f-progress').value) || 0;
    let watchDateValue = document.getElementById('f-watchdate').value || '';
    
    let entry = {
        id: editingId || Date.now(),
        title: title,
        type: type,
        year: parseInt(document.getElementById('f-year').value) || new Date().getFullYear(),
        status: document.getElementById('f-status').value,
        genre: document.getElementById('f-genre').value.trim(),
        episodes: episodes,
        currentEpisode: currentEpisodeValue,
        progress: finalProgress,
        rating: currentRating,
        notes: document.getElementById('f-notes').value.trim(),
        added: editingId ? (mediaData.find(x => x.id === editingId)?.added || Date.now()) : Date.now(),
        poster: document.getElementById('f-poster').value,
        tmdbId: document.getElementById('f-tmdbid').value,
        rewatch: parseInt(document.getElementById('f-rewatch').value) || 0,
        watchDate: watchDateValue,
        lastEdit: Date.now()
    };
    
    isSaving = true;
    let btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> Saving...';
    try {
        await apiSheets({ action: 'save', movie: entry });
        let idx = mediaData.findIndex(x => x.id === entry.id);
        if (idx >= 0) mediaData[idx] = entry;
        else mediaData.push(entry);
        renderMedia();
        closeModal();
        showToast(editingId ? 'Updated!' : 'Saved!');
    } catch(err) {
        showToast('Error: ' + err.message, true);
    } finally {
        isSaving = false;
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save mr-1"></i> Save Title';
    }
}
async function deleteEntry(id) {
    if (!confirm('Remove this title?')) return;
    try {
        await apiSheets({ action: 'delete', id: id });
        mediaData = mediaData.filter(x => x.id !== id);
        renderMedia(); closeDetail(); showToast('Removed');
    } catch(err) { showToast('Delete failed', true); }
}

// ============ FILTER & RENDER ==========
function getFilteredData() {
    let data = [...mediaData];
    if (currentStatusFilter !== 'all') data = data.filter(x => x.status === currentStatusFilter);
    if (currentTypeFilter !== 'all') data = data.filter(x => x.type === currentTypeFilter);
    if (currentGenreFilter !== 'all') data = data.filter(x => x.genre && x.genre.toLowerCase().includes(currentGenreFilter.toLowerCase()));
    let q = document.getElementById('search-input').value.toLowerCase().trim();
    if (q) data = data.filter(x => x.title.toLowerCase().includes(q) || (x.genre && x.genre.toLowerCase().includes(q)));
    let sort = document.getElementById('sort-select').value;
    if (sort === 'rating') data.sort((a,b) => b.rating - a.rating);
    else if (sort === 'title') data.sort((a,b) => a.title.localeCompare(b.title));
    else if (sort === 'year') data.sort((a,b) => b.year - a.year);
    else data.sort((a,b) => b.added - a.added);
    return data;
}
function setStatusFilter(s, el) { currentStatusFilter = s; renderMedia(); }
function setTypeFilter(t, el) { currentTypeFilter = t; renderMedia(); }
function setGenreFilter(g) { currentGenreFilter = currentGenreFilter === g ? 'all' : g; renderMedia(); }
function applyStatusFilter(s) { currentStatusFilter = s; renderMedia(); }
function resetAllFilters() { currentStatusFilter = 'all'; currentTypeFilter = 'all'; currentGenreFilter = 'all'; document.getElementById('sort-select').value = 'added'; renderMedia(); closeDrawer(); }
function renderStars(r) { let s = ''; for (let i=1; i<=10; i++) s += `<span class="star ${i<=r ? 'text-purple-400' : 'text-purple-400/30'} text-xs">★</span>`; return s; }
function formatEpisodeDisplay(cur, total) {
    if (!cur) return '';
    if (cur.includes('/')) return cur;
    if (total && total.match(/\d+\s*eps?/i)) return `${cur}/${total.match(/\d+/)[0]} eps`;
    if (total && total.match(/\d+\s*min/i)) return `${cur}/${total.match(/\d+/)[0]} min`;
    return cur;
}
function renderMedia() {
    if (isLoading) { showSkeleton(); return; }
    updateStats(); updateCounts(); updateGenreCloud();
    let data = getFilteredData();
    let container = document.getElementById('media-container');
    if (!data.length) { 
        container.innerHTML = `<div class="empty-state">
            <i class="fas fa-film text-5xl text-purple-500/30 mb-4 block"></i>
            <div class="text-purple-300/60">No titles found</div>
            <div class="text-sm text-purple-300/40 mt-2">Add your first film or anime</div>
            <button class="mt-4 bg-gradient-to-r from-purple-500 to-purple-600 rounded-full px-5 py-2 text-sm text-white font-semibold" onclick="openModal()"><i class="fas fa-plus mr-1"></i> Add Title</button>
        </div>`; 
        return; 
    }
    if (currentViewMode === 'grid') {
        container.innerHTML = `<div class="movies-grid">${data.map(m => {
            let statusClass = {watching:'status-watching',completed:'status-completed',plan:'status-plan',dropped:'status-dropped'}[m.status];
            let statusLabel = {watching:'Watching',completed:'Completed',plan:'Plan',dropped:'Dropped'}[m.status];
            let ratingDisplay = m.rating > 0 ? m.rating.toFixed(1) : 'NR';
            let posterHtml = m.poster ? `<img src="${m.poster}" loading="lazy" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/300x450/1A1A2E/8B5CF6?text=${m.title.charAt(0)}'">` : `<div class="w-full h-full flex items-center justify-center bg-gradient-to-br from-purple-900/50 to-purple-800/30 text-4xl text-purple-400/50">${m.title.charAt(0)}</div>`;
            let watchDateFormatted = formatWatchDate(m.watchDate);
            let rewatchText = formatRewatch(m.rewatch);
            return `<div class="movie-card" onclick="showDetail(${m.id})">
                        <div class="poster-container">
                            ${posterHtml}
                            <div class="rating-badge">⭐ ${ratingDisplay}</div>
                            <div class="status-badge ${statusClass}">${statusLabel}</div>
                        </div>
                        <div class="card-info">
                            <div class="card-title">${m.title}</div>
                            <div class="card-meta">${m.year} · ${m.type}</div>
                            ${formatEpisodeDisplay(m.currentEpisode,m.episodes) ? `<div class="text-xs text-purple-400 mt-1">${formatEpisodeDisplay(m.currentEpisode,m.episodes)}</div>` : ''}
                            <div class="info-row">
                                <span><i class="far fa-calendar-alt mr-1"></i>${watchDateFormatted !== 'Not set' ? watchDateFormatted.substring(0, 10) : 'Not set'}</span>
                                ${rewatchText ? `<span><i class="fas fa-redo-alt mr-1"></i>${rewatchText}</span>` : ''}
                            </div>
                            ${m.progress > 0 ? `<div class="progress-bar"><div class="progress-fill" style="width: ${m.progress}%"></div></div>` : ''}
                        </div>
                    </div>`;
        }).join('')}</div>`;
    } else {
        container.innerHTML = `<div class="space-y-3">${data.map(m => {
            let statusClass = {watching:'status-watching',completed:'status-completed',plan:'status-plan',dropped:'status-dropped'}[m.status];
            let watchDateFormatted = formatWatchDate(m.watchDate);
            let rewatchText = formatRewatch(m.rewatch);
            let posterHtml = m.poster ? `<img src="${m.poster}" loading="lazy" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/80x120/1A1A2E/8B5CF6?text=${m.title.charAt(0)}'">` : `<div class="w-full h-full flex items-center justify-center bg-gradient-to-br from-purple-900/50 to-purple-800/30 text-xl text-purple-400/50">${m.title.charAt(0)}</div>`;
            return `<div class="bg-[#0F0F1A] rounded-xl border border-purple-500/20 hover:border-purple-500/50 cursor-pointer p-3 flex gap-3" onclick="showDetail(${m.id})">
                        <div class="w-16 h-24 rounded-lg overflow-hidden flex-shrink-0 bg-[#0A0A0F]">${posterHtml}</div>
                        <div class="flex-1">
                            <div class="flex flex-wrap items-center gap-2 mb-1">
                                <span class="font-semibold">${m.title}</span>
                                <span class="${statusClass} text-xs px-2 py-0.5 rounded-full">${m.status}</span>
                            </div>
                            <div class="text-xs text-purple-300/50">${m.year} · ${m.type} ${m.genre ? '· ' + m.genre : ''}</div>
                            ${formatEpisodeDisplay(m.currentEpisode,m.episodes) ? `<div class="text-xs text-purple-400 mt-1">📺 ${formatEpisodeDisplay(m.currentEpisode,m.episodes)}</div>` : ''}
                            <div class="flex flex-wrap gap-3 mt-2 text-xs text-purple-300/50">
                                <span><i class="far fa-calendar-alt mr-1"></i>${watchDateFormatted}</span>
                                ${rewatchText ? `<span><i class="fas fa-redo-alt mr-1"></i>${rewatchText}</span>` : ''}
                                ${m.rating ? `<span><i class="fas fa-star mr-1 text-purple-400"></i>${m.rating}/10</span>` : ''}
                            </div>
                            ${m.progress > 0 ? `<div class="progress-bar mt-2"><div class="progress-fill" style="width: ${m.progress}%"></div></div>` : ''}
                        </div>
                    </div>`;
        }).join('')}</div>`;
    }
    document.getElementById('btn-grid').className = 'w-9 h-9 rounded-xl border border-purple-500/30 ' + (currentViewMode === 'grid' ? 'bg-purple-500/20 text-purple-400' : 'bg-transparent text-purple-300/60');
    document.getElementById('btn-list').className = 'w-9 h-9 rounded-xl border border-purple-500/30 ' + (currentViewMode === 'list' ? 'bg-purple-500/20 text-purple-400' : 'bg-transparent text-purple-300/60');
    document.getElementById('section-title').innerHTML = ({all:'All',watching:'Watching',completed:'Completed',plan:'Plan to Watch',dropped:'Dropped'}[currentStatusFilter] || 'All') + ' <span class="text-purple-400">Titles</span>';
}
function updateStats() {
    document.getElementById('stat-total').textContent = mediaData.length;
    document.getElementById('stat-watching').textContent = mediaData.filter(x => x.status === 'watching').length;
    document.getElementById('stat-completed').textContent = mediaData.filter(x => x.status === 'completed').length;
    document.getElementById('stat-plan').textContent = mediaData.filter(x => x.status === 'plan').length;
}
function updateCounts() {
    let c = { 
        all: mediaData.length, 
        watching: mediaData.filter(x => x.status === 'watching').length, 
        completed: mediaData.filter(x => x.status === 'completed').length, 
        plan: mediaData.filter(x => x.status === 'plan').length, 
        dropped: mediaData.filter(x => x.status === 'dropped').length,
        movie: mediaData.filter(x => x.type === 'Movie').length, 
        series: mediaData.filter(x => x.type === 'Series').length, 
        'anime-movie': mediaData.filter(x => x.type === 'Anime Movie').length, 
        'anime-series': mediaData.filter(x => x.type === 'Anime Series').length 
    };
    document.getElementById('cnt-all').textContent = c.all;
    document.getElementById('cnt-watching-nav').textContent = c.watching;
    document.getElementById('cnt-completed-nav').textContent = c.completed;
    document.getElementById('cnt-plan-nav').textContent = c.plan;
    document.getElementById('cnt-dropped-nav').textContent = c.dropped;
    document.getElementById('cnt-movie').textContent = c.movie;
    document.getElementById('cnt-series').textContent = c.series;
    document.getElementById('cnt-anime-movie').textContent = c['anime-movie'];
    document.getElementById('cnt-anime-series').textContent = c['anime-series'];
}
function updateGenreCloud() {
    let genres = new Set();
    mediaData.forEach(m => { if(m.genre) m.genre.split(',').forEach(g => genres.add(g.trim())); });
    document.getElementById('genre-cloud').innerHTML = [...genres].sort().map(g => `<button class="filter-chip ${currentGenreFilter===g ? 'active' : ''}" onclick="setGenreFilter('${g.replace(/'/g,"\\'")}')">${g}</button>`).join('') || '<span class="text-purple-300/40 text-xs">No genres</span>';
}
function setViewMode(m) { currentViewMode = m; renderMedia(); }

// ============ MODAL - FIXED RATING ==========
function openModal(id) {
    editingId = id || null;
    let m = id ? mediaData.find(x => x.id === id) : null;
    
    console.log("Opening modal - rating value:", m?.rating);
    
    document.getElementById('modal-heading').innerHTML = m ? '<i class="fas fa-edit mr-2"></i> Edit Title' : '<i class="fas fa-plus-circle mr-2"></i> Add New Title';
    document.getElementById('f-title').value = m?.title || '';
    document.getElementById('f-type').value = m?.type || 'Movie';
    document.getElementById('f-year').value = m?.year || '';
    document.getElementById('f-status').value = m?.status || 'plan';
    document.getElementById('f-genre').value = m?.genre || '';
    document.getElementById('f-episodes').value = m?.episodes || '';
    document.getElementById('f-current-episode').value = m?.currentEpisode || '';
    document.getElementById('f-progress').value = m?.progress || 0;
    document.getElementById('f-notes').value = m?.notes || '';
    document.getElementById('f-rewatch').value = m?.rewatch || 0;
    document.getElementById('f-poster').value = m?.poster || '';
    document.getElementById('f-tmdbid').value = m?.tmdbId || '';
    document.getElementById('tmdb-q').value = m?.title || '';
    document.getElementById('f-watchdate').value = (m && m.watchDate && m.watchDate !== '') ? m.watchDate : '';
    
    // FIX: Set rating with correct value
    let ratingValue = (m && typeof m.rating === 'number') ? m.rating : 0;
    console.log("Setting rating to:", ratingValue);
    
    // Clear all star classes first
    document.querySelectorAll('#star-rating .star-btn').forEach(btn => {
        btn.classList.remove('text-purple-400');
        btn.classList.add('text-purple-400/30');
    });
    
    // Set stars based on rating value
    for (let i = 1; i <= ratingValue; i++) {
        let starBtn = document.querySelector(`#star-rating .star-btn[data-v="${i}"]`);
        if (starBtn) {
            starBtn.classList.remove('text-purple-400/30');
            starBtn.classList.add('text-purple-400');
        }
    }
    currentRating = ratingValue;
    
    updatePosterPreview(m?.poster, m?.title);
    document.getElementById('modal-overlay').classList.remove('opacity-0', 'pointer-events-none');
    document.getElementById('modal-overlay').classList.add('opacity-100', 'pointer-events-auto');
}

function closeModal() { 
    document.getElementById('modal-overlay').classList.add('opacity-0', 'pointer-events-none');
    document.getElementById('modal-overlay').classList.remove('opacity-100', 'pointer-events-auto');
    editingId = null; 
}
function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function setRating(v) { 
    currentRating = v; 
    console.log("setRating called with value:", v);
    document.querySelectorAll('#star-rating .star-btn').forEach(btn => {
        let btnValue = parseInt(btn.getAttribute('data-v'));
        if (btnValue <= v) {
            btn.classList.remove('text-purple-400/30');
            btn.classList.add('text-purple-400');
        } else {
            btn.classList.remove('text-purple-400');
            btn.classList.add('text-purple-400/30');
        }
    }); 
}

function updatePosterPreview(url, title) {
    let box = document.getElementById('poster-box');
    if (url && url !== 'null' && url !== '') box.innerHTML = `<img src="${url}" class="w-full h-full object-cover rounded-xl">`;
    else box.innerHTML = `<i class="fas fa-image text-3xl text-purple-500/30"></i>`;
}

// ============ DETAIL ==========
function showDetail(id) {
    let m = mediaData.find(x => x.id === id);
    if (!m) return;
    let watchDateFormatted = formatWatchDate(m.watchDate);
    let rewatchText = formatRewatch(m.rewatch);
    let episodeDisplay = formatEpisodeDisplay(m.currentEpisode, m.episodes);
    let posterHtml = m.poster ? `<img class="w-32 h-48 object-cover rounded-xl shadow-lg" src="${m.poster}" loading="lazy" onerror="this.src='https://placehold.co/128x192/1A1A2E/8B5CF6?text=${m.title.charAt(0)}'">` : `<div class="w-32 h-48 rounded-xl bg-gradient-to-br from-purple-900/50 to-purple-800/30 flex items-center justify-center text-4xl text-purple-400/50 shadow-lg">${m.title.charAt(0)}</div>`;
    document.getElementById('detail-body').innerHTML = `
        <div class="flex gap-4 flex-wrap md:flex-nowrap">
            ${posterHtml}
            <div class="flex-1">
                <div class="text-xl md:text-2xl font-semibold">${m.title}</div>
                <div class="text-purple-300/60 text-sm mt-1">${m.type} · ${m.year} · ${m.genre || 'No genre'}</div>
                ${episodeDisplay ? `<div class="text-purple-400 text-sm mt-1">📺 ${episodeDisplay}</div>` : ''}
                <div class="flex items-center gap-2 mt-2"><span class="text-2xl font-bold text-purple-400">${m.rating > 0 ? m.rating.toFixed(1) : 'NR'}</span><span class="text-sm text-purple-300/50">/10</span>${renderStars(m.rating)}</div>
            </div>
        </div>
        <div class="mt-4 space-y-3">
            <div class="flex justify-between py-2 border-b border-purple-500/20"><span class="text-purple-300/50">Status</span><span class="${m.status === 'watching' ? 'status-watching' : m.status === 'completed' ? 'status-completed' : m.status === 'plan' ? 'status-plan' : 'status-dropped'} text-xs px-2 py-0.5 rounded-full">${m.status}</span></div>
            <div class="flex justify-between py-2 border-b border-purple-500/20"><span class="text-purple-300/50">Watch Date</span><span>${watchDateFormatted !== 'Not set' ? watchDateFormatted : 'Not set'}</span></div>
            <div class="flex justify-between py-2 border-b border-purple-500/20"><span class="text-purple-300/50">Rewatch</span><span>${rewatchText || '0 time'}</span></div>
            <div class="flex justify-between py-2 border-b border-purple-500/20"><span class="text-purple-300/50">Progress</span><span><div class="progress-bar w-32 inline-block ml-2"><div class="progress-fill" style="width: ${m.progress}%"></div></div><span class="ml-2 text-sm">${m.progress}%</span></span></div>
            ${m.notes ? `<div class="mt-3 p-3 bg-purple-500/5 rounded-xl border border-purple-500/20"><i class="fas fa-quote-left text-purple-400 mr-2"></i>${m.notes}</div>` : ''}
        </div>
        <div class="flex gap-3 mt-5 pt-3 border-t border-purple-500/20">
            <button class="bg-gradient-to-r from-purple-500 to-purple-600 rounded-xl px-5 py-2 text-white font-semibold" onclick="closeDetail(); openModal(${m.id})"><i class="fas fa-edit mr-1"></i> Edit</button>
            <button class="bg-red-500/10 border border-red-500/30 rounded-xl px-5 py-2 text-red-400" onclick="deleteEntry(${m.id})"><i class="fas fa-trash mr-1"></i> Delete</button>
        </div>
    `;
    document.getElementById('detail-overlay').classList.remove('opacity-0', 'pointer-events-none');
    document.getElementById('detail-overlay').classList.add('opacity-100', 'pointer-events-auto');
}
function closeDetail() { 
    document.getElementById('detail-overlay').classList.add('opacity-0', 'pointer-events-none');
    document.getElementById('detail-overlay').classList.remove('opacity-100', 'pointer-events-auto');
}
function closeDetailOutside(e) { if (e.target === document.getElementById('detail-overlay')) closeDetail(); }

// ============ TMDB ==========
function onTmdbType(v) {
    clearTimeout(tmdbTimer);
    if (v.length < 2) { document.getElementById('tmdb-dd').style.display = 'none'; return; }
    tmdbTimer = setTimeout(() => searchTmdb(v), 400);
}
async function searchTmdb(q) {
    try {
        let res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}`);
        let data = await res.json();
        let items = (data.results || []).filter(x => x.media_type === 'movie' || x.media_type === 'tv').slice(0, 6);
        let dd = document.getElementById('tmdb-dd');
        if (!items.length) { dd.style.display = 'none'; return; }
        let itemsWithDetails = await Promise.all(items.map(async item => {
            let genres = '', runtime = '', poster = '';
            try {
                let detail = await fetch(`https://api.themoviedb.org/3/${item.media_type==='tv'?'tv':'movie'}/${item.id}?api_key=${TMDB_KEY}`);
                let d = await detail.json();
                genres = (d.genres || []).map(g=>g.name).slice(0,3).join(', ');
                runtime = item.media_type==='tv' ? (d.number_of_episodes?`${d.number_of_episodes} eps`:''): (d.runtime?`${d.runtime} min`:'');
                poster = item.poster_path ? TMDB_IMG_BASE + item.poster_path : '';
            } catch(e) {}
            return {...item, genres, runtime, poster};
        }));
        dd.innerHTML = itemsWithDetails.map(item => `<div class="p-3 border-b border-purple-500/20 hover:bg-purple-500/10 cursor-pointer flex gap-3" onclick="selectTmdb('${(item.title||item.name).replace(/'/g,"\\'")}','${item.media_type==='tv'?'Series':'Movie'}','${(item.release_date||item.first_air_date||'').slice(0,4)}','${item.poster}','${item.genres.replace(/'/g,"\\'")}','${item.runtime}')"><img class="w-10 h-14 object-cover rounded" src="${item.poster||''}" onerror="this.style.display='none'"><div><div class="font-semibold text-purple-400">${item.title||item.name}</div><div class="text-xs text-purple-300/50">${(item.release_date||item.first_air_date||'').slice(0,4)} · ${item.media_type==='tv'?'Series':'Movie'} ${item.runtime?'· '+item.runtime:''}</div><div class="text-xs text-purple-300/40">${item.genres||'Click to select'}</div></div></div>`).join('');
        dd.style.display = 'block';
    } catch(e) { console.error(e); }
}
function selectTmdb(title, type, year, poster, genres, runtime) {
    document.getElementById('f-title').value = title;
    document.getElementById('f-type').value = type;
    document.getElementById('f-year').value = year;
    document.getElementById('f-poster').value = poster;
    if (genres) document.getElementById('f-genre').value = genres;
    if (runtime) document.getElementById('f-episodes').value = runtime;
    updatePosterPreview(poster, title);
    document.getElementById('tmdb-dd').style.display = 'none';
}
function clearTmdb() { document.getElementById('tmdb-q').value = ''; document.getElementById('tmdb-dd').style.display = 'none'; }

// ============ DRAWER ==========
function openDrawer() { document.getElementById('filter-drawer').classList.add('open'); updateDrawerContent(); }
function closeDrawer() { document.getElementById('filter-drawer').classList.remove('open'); }
function updateDrawerContent() {
    let genres = [...new Set(mediaData.map(m=>m.genre).filter(Boolean).flatMap(g=>g.split(',').map(s=>s.trim())))];
    document.getElementById('drawer-status').innerHTML = `<button class="filter-chip ${currentStatusFilter==='all'?'active':''}" onclick="setStatusFilter('all');closeDrawer();renderMedia();">All</button><button class="filter-chip ${currentStatusFilter==='watching'?'active':''}" onclick="setStatusFilter('watching');closeDrawer();renderMedia();">Watching</button><button class="filter-chip ${currentStatusFilter==='completed'?'active':''}" onclick="setStatusFilter('completed');closeDrawer();renderMedia();">Completed</button><button class="filter-chip ${currentStatusFilter==='plan'?'active':''}" onclick="setStatusFilter('plan');closeDrawer();renderMedia();">Plan</button>`;
    document.getElementById('drawer-type').innerHTML = `<button class="filter-chip ${currentTypeFilter==='all'?'active':''}" onclick="setTypeFilter('all');closeDrawer();renderMedia();">All Types</button><button class="filter-chip ${currentTypeFilter==='Movie'?'active':''}" onclick="setTypeFilter('Movie');closeDrawer();renderMedia();">🎬 Movie</button><button class="filter-chip ${currentTypeFilter==='Series'?'active':''}" onclick="setTypeFilter('Series');closeDrawer();renderMedia();">📺 Series</button><button class="filter-chip ${currentTypeFilter==='Anime Movie'?'active':''}" onclick="setTypeFilter('Anime Movie');closeDrawer();renderMedia();">🎬 Anime Movie</button><button class="filter-chip ${currentTypeFilter==='Anime Series'?'active':''}" onclick="setTypeFilter('Anime Series');closeDrawer();renderMedia();">📺 Anime Series</button>`;
    document.getElementById('drawer-genre').innerHTML = genres.map(g => `<button class="filter-chip ${currentGenreFilter===g?'active':''}" onclick="setGenreFilter('${g.replace(/'/g,"\\'")}');closeDrawer();renderMedia();">${g}</button>`).join('') || '<span class="text-purple-300/40 text-xs">No genres</span>';
}

// ============ INIT ==========
document.addEventListener('click', e => { if (!e.target.closest('.tmdb-wrap')) document.getElementById('tmdb-dd').style.display = 'none'; });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeDetail(); } });
document.getElementById('f-current-episode')?.addEventListener('input', updateProgressAutomatically);
document.getElementById('f-episodes')?.addEventListener('input', updateProgressAutomatically);
document.getElementById('f-type')?.addEventListener('change', updateProgressAutomatically);
setInterval(loadFromSheets, 120000);
loadFromSheets();
</script>
