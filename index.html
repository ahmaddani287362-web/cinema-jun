<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CINÉMA JUN — Film Diary</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--gold:#C9A84C;--gold-light:#E8C97A;--gold-dim:#8B6E30;--bg:#0A0A0C;--surface:#111116;--surface2:#18181F;--surface3:#1F1F28;--border:#2A2A35;--border-soft:#222230;--text:#F0EEE8;--text-muted:#8A8899;--text-dim:#55546A;--red:#E05555;--green:#5EC47A;--blue:#5B8DEF;--purple:#9B6BF0;--serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
  .sync-bar{background:var(--surface);border-bottom:1px solid var(--border-soft);padding:.4rem 2.5rem;display:flex;align-items:center;gap:.6rem;font-size:.75rem;color:var(--text-dim)}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);flex-shrink:0}
  .sync-dot.online{background:var(--green)}.sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite}.sync-dot.error{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  
  /* ===== ENHANCED HEADER ===== */
  header{position:sticky;top:0;z-index:100;background:rgba(10,10,12,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-soft);padding:0 2.5rem;height:80px;display:flex;align-items:center;justify-content:space-between;transition:all .3s ease}
  .logo-group{display:flex;align-items:baseline;gap:1rem;flex-wrap:wrap}
  .logo{font-family:var(--serif);font-size:1.9rem;font-weight:300;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;background:linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 70%, #EEDBAA 100%);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 8px rgba(201,168,76,0.2);position:relative}
  .logo::after{content:'';position:absolute;bottom:-6px;left:0;width:40%;height:1px;background:linear-gradient(90deg, var(--gold), transparent);opacity:.6}
  .logo span{color:var(--text-dim);font-style:italic;background:none;-webkit-background-clip:unset;background-clip:unset;color:var(--text-muted);text-shadow:none}
  .tagline{font-family:var(--sans);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);border-left:1px solid var(--border);padding-left:1rem;font-weight:300;white-space:nowrap}
  .tagline em{color:var(--gold-light);font-style:normal;font-weight:400}
  .header-actions{display:flex;gap:1rem;align-items:center}
  .btn{font-family:var(--sans);font-size:.8rem;font-weight:500;letter-spacing:.08em;padding:.55rem 1.35rem;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);backdrop-filter:blur(4px)}
  .btn:hover{border-color:var(--gold-dim);color:var(--gold);transform:translateY(-1px);background:rgba(201,168,76,.05)}
  .btn-primary{background:linear-gradient(115deg, var(--gold) 0%, var(--gold-dim) 100%);border-color:transparent;color:#0A0A0C;font-weight:500;box-shadow:0 2px 6px rgba(201,168,76,.2)}
  .btn-primary:hover{background:linear-gradient(115deg, var(--gold-light) 0%, var(--gold) 100%);color:#0A0A0C;transform:translateY(-2px);box-shadow:0 6px 14px rgba(201,168,76,.25);border-color:rgba(201,168,76,.3)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  
  /* floating decorative line */
  .header-accent{position:absolute;bottom:-1px;left:0;width:100%;height:1px;background:linear-gradient(90deg, transparent, var(--gold-dim), var(--gold-light), var(--gold-dim), transparent);opacity:.4}
  
  /* rest of original styles (unchanged except minor) */
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-soft);border-bottom:1px solid var(--border-soft)}
  .stat-item{background:var(--surface);padding:1.5rem 2.5rem;position:relative;overflow:hidden;cursor:pointer;transition:.2s}
  .stat-item:hover{background:var(--surface2)}
  .stat-item::after{content:'';position:absolute;bottom:0;left:2.5rem;right:2.5rem;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);opacity:.4}
  .stat-label{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.4rem}
  .stat-value{font-family:var(--serif);font-size:2.2rem;font-weight:300;color:var(--text);line-height:1}
  .stat-sub{font-size:.75rem;color:var(--text-dim);margin-top:.3rem}
  main{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 130px)}
  aside{background:var(--surface);border-right:1px solid var(--border-soft);padding:2rem 0;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto}
  .sidebar-section{padding:0 1.5rem;margin-bottom:2rem}
  .sidebar-title{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid var(--border-soft)}
  .nav-item{display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;border-radius:2px;cursor:pointer;transition:.15s;font-size:.875rem;color:var(--text-muted);margin-bottom:.15rem}
  .nav-item:hover{background:var(--surface2);color:var(--text)}
  .nav-item.active{background:rgba(201,168,76,.08);color:var(--gold);border-left:2px solid var(--gold);padding-left:calc(.75rem - 2px)}
  .nav-dot{width:6px;height:6px;border-radius:50%}
  .dot-all{background:var(--text-dim)}.dot-watching{background:var(--blue)}.dot-completed{background:var(--green)}.dot-plan{background:var(--purple)}.dot-dropped{background:var(--red)}
  .nav-count{margin-left:auto;font-size:.7rem;color:var(--text-dim);background:var(--surface2);padding:.15rem .5rem;border-radius:20px}
  .genre-cloud{display:flex;flex-wrap:wrap;gap:.4rem}
  .genre-tag{font-size:.7rem;padding:.25rem .6rem;border-radius:1px;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:.15s;background:transparent;font-family:var(--sans)}
  .genre-tag:hover,.genre-tag.active{border-color:var(--gold-dim);color:var(--gold);background:rgba(201,168,76,.05)}
  .content{padding:2rem 2.5rem;background:var(--bg)}
  .content-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem}
  .section-title{font-family:var(--serif);font-size:1.75rem;font-weight:300}
  .section-title em{color:var(--gold);font-style:italic}
  .view-controls{display:flex;gap:.4rem}
  .view-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:.15s;border-radius:2px;font-size:1rem}
  .view-btn.active,.view-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
  .search-row{display:flex;gap:.75rem;margin-bottom:1.5rem;align-items:center}
  .search-wrap{flex:1;position:relative;min-width:300px}
  .search-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:.875rem;padding:.65rem 1rem .65rem 2.75rem;border-radius:2px;outline:none;transition:.2s}
  .search-input:focus{border-color:var(--gold-dim)}
  .search-input::placeholder{color:var(--text-dim)}
  .search-icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:1rem}
  select.filter-select{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font-family:var(--sans);font-size:.8rem;padding:.65rem 1rem;border-radius:2px;cursor:pointer;outline:none;white-space:nowrap}
  .media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1.25rem}
  .media-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:2px;overflow:hidden;cursor:pointer;transition:.2s;position:relative}
  .media-card:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
  .card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
  .poster-placeholder{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:3rem;font-weight:300;color:var(--text-dim)}
  .card-badge{position:absolute;top:.6rem;right:.6rem;font-size:.65rem;letter-spacing:.06em;padding:.25rem .5rem;border-radius:1px;font-weight:500;text-transform:uppercase;z-index:2}
  .badge-watching{background:rgba(91,141,239,.2);color:#7AAFF5;border:1px solid rgba(91,141,239,.3)}
  .badge-completed{background:rgba(94,196,122,.2);color:#7ED896;border:1px solid rgba(94,196,122,.3)}
  .badge-plan{background:rgba(155,107,240,.2);color:#B68FF5;border:1px solid rgba(155,107,240,.3)}
  .badge-dropped{background:rgba(224,85,85,.2);color:#F07A7A;border:1px solid rgba(224,85,85,.3)}
  .card-info{padding:.75rem}
  .card-title{font-size:.85rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.25rem}
  .card-meta{font-size:.72rem;color:var(--text-dim);display:flex;gap:.5rem}
  .card-year{color:var(--text-muted)}
  .card-type{color:var(--gold-dim);text-transform:uppercase;font-size:.65rem;letter-spacing:.06em}
  .star-row{display:flex;gap:.1rem;margin-top:.4rem}
  .star{font-size:.75rem;color:var(--text-dim)}.star.filled{color:var(--gold)}
  .progress-bar{height:2px;background:var(--border);margin-top:.6rem;overflow:hidden}
  .progress-fill{height:100%;background:var(--gold)}
  .episode-badge{font-size:.65rem;color:var(--gold);margin-top:.3rem}
  .media-list{display:flex;flex-direction:column;gap:.5rem}
  .list-item{background:var(--surface);border:1px solid var(--border-soft);border-radius:2px;display:grid;grid-template-columns:56px 1fr auto;gap:1rem;align-items:center;padding:.75rem 1rem;cursor:pointer;transition:.15s}
  .list-item:hover{border-color:var(--gold-dim)}
  .list-thumb{width:56px;height:80px;background:var(--surface2);border-radius:1px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:1.2rem;color:var(--text-dim);flex-shrink:0;overflow:hidden}
  .list-thumb img{width:100%;height:100%;object-fit:cover}
  .list-body{min-width:0}
  .list-title{font-size:.9rem;font-weight:500;color:var(--text);margin-bottom:.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .list-detail{font-size:.75rem;color:var(--text-dim);display:flex;gap:.75rem;flex-wrap:wrap}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:1.5rem;backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:.2s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:2px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto}
  .modal-header{padding:1.75rem 2rem 1.25rem;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:flex-start}
  .modal-title{font-family:var(--serif);font-size:1.5rem;font-weight:300}
  .modal-close{background:none;border:1px solid var(--border);color:var(--text-muted);width:32px;height:32px;border-radius:2px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
  .modal-close:hover{border-color:var(--red);color:var(--red)}
  .modal-body{padding:1.5rem 2rem 2rem}
  .tmdb-wrap{position:relative;margin-bottom:1.25rem}
  .tmdb-row{display:flex;gap:.5rem}
  .tmdb-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:.875rem;padding:.65rem .9rem;border-radius:2px;outline:none;transition:.2s}
  .tmdb-input:focus{border-color:var(--gold-dim)}
  .tmdb-input::placeholder{color:var(--text-dim)}
  .tmdb-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-top:none;z-index:50;max-height:280px;overflow-y:auto;display:none}
  .tmdb-item{display:flex;gap:.75rem;align-items:center;padding:.6rem .9rem;cursor:pointer;transition:.1s;border-bottom:1px solid var(--border-soft)}
  .tmdb-item:last-child{border-bottom:none}
  .tmdb-item:hover{background:var(--surface3)}
  .tmdb-thumb{width:36px;height:54px;object-fit:cover;border-radius:1px;flex-shrink:0}
  .tmdb-nothumb{width:36px;height:54px;background:var(--surface3);border-radius:1px;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--text-dim);flex-shrink:0}
  .tmdb-name{font-size:.85rem;font-weight:500;color:var(--text)}
  .tmdb-sub{font-size:.72rem;color:var(--text-dim);margin-top:.15rem}
  .add-layout{display:flex;gap:1.25rem;margin-bottom:1.25rem;align-items:flex-start}
  .poster-box{flex-shrink:0}
  .poster-box img,.poster-ph{width:90px;height:135px;border-radius:2px;object-fit:cover;border:1px solid var(--border)}
  .poster-ph{background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:2rem;color:var(--text-dim);border:1px solid var(--border-soft)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .form-group{display:flex;flex-direction:column;gap:.4rem}
  .form-group.full{grid-column:1/-1}
  label{font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim)}
  input[type=text],input[type=number],textarea,select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:.875rem;padding:.65rem .9rem;border-radius:2px;outline:none;transition:.2s;width:100%}
  input:focus,textarea:focus,select:focus{border-color:var(--gold-dim)}
  textarea{resize:vertical;min-height:80px}
  .star-rating{display:flex;gap:.25rem}
  .star-btn{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text-dim);transition:.1s;padding:.1rem}
  .star-btn:hover,.star-btn.active{color:var(--gold)}
  .modal-footer{display:flex;justify-content:flex-end;gap:.75rem;padding-top:1rem;border-top:1px solid var(--border-soft);margin-top:1rem}
  .detail-poster{width:110px;height:165px;object-fit:cover;border-radius:2px;flex-shrink:0}
  .detail-poster-ph{width:110px;height:165px;background:var(--surface2);border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:2.5rem;color:var(--text-dim);flex-shrink:0}
  .detail-rating-big{font-family:var(--serif);font-size:3rem;font-weight:300;color:var(--gold)}
  .detail-row{display:flex;justify-content:space-between;align-items:center;padding:.6rem 0;border-bottom:1px solid var(--border-soft);font-size:.85rem}
  .detail-row:last-child{border-bottom:none}
  .detail-key{color:var(--text-dim)}
  .detail-val{color:var(--text);text-align:right}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2rem;text-align:center}
  .empty-icon{font-family:var(--serif);font-size:4rem;color:var(--text-dim);margin-bottom:1rem;opacity:.4}
  .empty-title{font-family:var(--serif);font-size:1.4rem;font-weight:300;color:var(--text-muted);margin-bottom:.5rem}
  .empty-sub{font-size:.85rem;color:var(--text-dim)}
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2rem;gap:1rem}
  .spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface);border:1px solid var(--gold-dim);color:var(--gold);padding:.75rem 1.25rem;border-radius:2px;font-size:.85rem;z-index:500;transform:translateY(20px);opacity:0;transition:.3s;pointer-events:none}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.error{border-color:rgba(224,85,85,.5);color:var(--red)}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}
  @media(max-width:900px){main{grid-template-columns:1fr}aside{display:none}.stats-bar{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.form-group.full{grid-column:1}.add-layout{flex-direction:column}.search-wrap{min-width:200px}header{padding:0 1.25rem;height:70px}.logo{font-size:1.4rem;letter-spacing:.2em}.tagline{display:none}.logo-group{gap:.5rem}}
  @media(max-width:600px){.search-wrap{min-width:150px}.tagline{display:none}}
  .mob-filter-bar{display:none}.mob-fab{display:none}.drawer-overlay{display:none}.filter-drawer{display:none}
  @media(max-width:900px){
    body{padding-bottom:80px}
    .toast{bottom:88px}
    .mob-filter-bar{display:flex;gap:.5rem;overflow-x:auto;padding:.5rem 0 .75rem;scrollbar-width:none;margin-bottom:.5rem}
    .mob-filter-bar::-webkit-scrollbar{display:none}
    .mchip{flex-shrink:0;font-family:var(--sans);font-size:.75rem;padding:.35rem .8rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:.15s;white-space:nowrap}
    .mchip.active{background:rgba(201,168,76,.12);border-color:var(--gold-dim);color:var(--gold)}
    .mob-fab{display:flex;position:fixed;bottom:1.25rem;right:1.25rem;z-index:150;gap:.6rem;align-items:center}
    .fab-filter{font-family:var(--sans);font-size:.8rem;font-weight:500;padding:.65rem 1rem;border-radius:24px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.4);display:flex;align-items:center;gap:.4rem;transition:.2s}
    .fab-filter.has-filter{border-color:var(--gold-dim);color:var(--gold)}
    .fab-add{font-size:1.4rem;width:50px;height:50px;border-radius:50%;border:none;background:var(--gold);color:#0A0A0C;cursor:pointer;box-shadow:0 4px 20px rgba(201,168,76,.35);display:flex;align-items:center;justify-content:center;transition:.2s;font-family:var(--sans)}
    .fab-add:active{transform:scale(.95)}
    .header-add-btn{display:none}
    .drawer-overlay{display:block;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;opacity:0;pointer-events:none;transition:.25s;backdrop-filter:blur(3px)}
    .drawer-overlay.open{opacity:1;pointer-events:all}
    .filter-drawer{display:block;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);border-radius:16px 16px 0 0;z-index:301;transform:translateY(100%);transition:.3s cubic-bezier(.4,0,.2,1);max-height:85vh;overflow-y:auto}
    .filter-drawer.open{transform:translateY(0)}
    .drawer-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
    .drawer-header{padding:1rem 1.5rem .75rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border-soft)}
    .drawer-title{font-family:var(--serif);font-size:1.2rem;font-weight:300;color:var(--text)}
    .drawer-reset{font-family:var(--sans);font-size:.75rem;color:var(--text-dim);background:none;border:none;cursor:pointer;padding:.25rem .5rem}
    .drawer-section{padding:.75rem 1.5rem}
    .drawer-section-title{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.6rem}
    .drawer-chips{display:flex;flex-wrap:wrap;gap:.4rem}
    .dchip{font-family:var(--sans);font-size:.8rem;padding:.4rem .9rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:.4rem}
    .dchip.active{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold);font-weight:500}
    .ddot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .drawer-apply{display:block;width:calc(100% - 3rem);margin:1rem 1.5rem 1.5rem;padding:.8rem;background:var(--gold);color:#0A0A0C;border:none;border-radius:4px;font-family:var(--sans);font-size:.875rem;font-weight:500;cursor:pointer}
    .genre-drawer-cloud{display:flex;flex-wrap:wrap;gap:.4rem;max-height:130px;overflow-y:auto}
  }
</style>
</head>
<body>

<div class="sync-bar">
  <span class="sync-dot" id="sync-dot"></span>
  <span id="sync-status">Connecting...</span>
</div>

<header>
  <div class="logo-group">
    <div class="logo">Ciné<span>ma Jun</span></div>
